name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            package_suffix: windows-x64
          - name: Linux
            os: ubuntu-latest
            package_suffix: linux-x64
          - name: macOS
            os: macos-latest
            package_suffix: macos

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Stage install tree
        run: cmake --install build --prefix stage

      - name: Upload staged package
        uses: actions/upload-artifact@v4
        with:
          name: gaga-${{ matrix.platform.package_suffix }}-debug
          path: stage
          if-no-files-found: error
