name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            package_suffix: windows-x64
          - name: Linux
            os: ubuntu-latest
            package_suffix: linux-x64
          - name: macOS
            os: macos-latest
            package_suffix: macos

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Stage install tree
        run: cmake --install build --prefix stage

      - name: Package Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $package = "gaga-$env:GITHUB_REF_NAME-${{ matrix.platform.package_suffix }}.zip"
          Compress-Archive -Path stage\* -DestinationPath $package -Force
          "PACKAGE_NAME=$package" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package Unix release
        if: runner.os != 'Windows'
        shell: bash
        run: |
          package="gaga-${GITHUB_REF_NAME}-${{ matrix.platform.package_suffix }}.tar.gz"
          tar -C stage -czf "$package" .
          echo "PACKAGE_NAME=$package" >> "$GITHUB_ENV"

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform.package_suffix }}
          path: ${{ env.PACKAGE_NAME }}
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
